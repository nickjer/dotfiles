services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - $HOME/caddy/Caddyfile:/etc/caddy/Caddyfile
      - $HOME/caddy/site:/srv
      - caddy_data:/data
      - caddy_config:/config
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: $USER
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - "/var/run/postgresql:/var/run/postgresql"
      - "db_data:/var/lib/postgresql/data"
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  db_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
